<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>El Océano de Ryoko 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* evitar selección accidental de texto */
        }

        body {
            background: linear-gradient(145deg, #001f3f 0%, #002b4f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Pacifico', cursive, sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        /* contenedor principal del océano */
        .ocean-world {
            position: relative;
            width: 1300px;
            max-width: 98vw;
            height: 85vh;
            min-height: 600px;
            background: radial-gradient(circle at 20% 30%, #0a4c6e, #022b44);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.2);
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(255,215,150,0.6);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 2;
            pointer-events: none;
        }

        /* capa de flores interactivas */
        .flowers-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .flower {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3));
            transition: transform 0.2s ease, filter 0.2s;
            width: 70px;
            text-align: center;
            z-index: 20;
        }

        .flower:hover {
            transform: scale(1.1) rotate(2deg);
            filter: drop-shadow(0 10px 18px rgba(255,200,230,0.6));
        }

        .flower-emoji {
            font-size: 58px;
            display: block;
            transition: all 0.2s;
        }

        /* panel de mensajes románticos */
        .message-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(10, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 18px 24px;
            color: #fff3e0;
            font-size: 1.2rem;
            font-weight: 500;
            text-align: center;
            font-family: 'Segoe UI', 'Quicksand', cursive;
            border: 1px solid rgba(255,220,150,0.7);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 30;
            transition: all 0.4s ease;
            max-height: 220px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .romantic-text {
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            word-break: break-word;
        }

        .poem-area {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 48px;
            padding: 16px 20px;
            margin-top: 8px;
            font-style: italic;
            white-space: pre-line;
            font-size: 1.1rem;
        }

        .flower-counter {
            position: absolute;
            top: 18px;
            right: 25px;
            background: #ffb7c5cc;
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: bold;
            color: #220022;
            font-family: monospace;
            font-size: 1.2rem;
            z-index: 35;
            border: 1px solid #ffddbb;
            box-shadow: 0 2px 8px black;
            pointer-events: none;
        }

        @keyframes gentleWave {
            0% { transform: translateY(0px);}
            100% { transform: translateY(-4px);}
        }

        @keyframes floatSwim {
            0% { transform: translateX(-5px) translateY(0px);}
            100% { transform: translateX(8px) translateY(6px);}
        }

        .heartbeat {
            display: inline-block;
            animation: tinyPulse 1s infinite;
        }

        @keyframes tinyPulse {
            0% { transform: scale(1); opacity: 0.8;}
            100% { transform: scale(1.1); opacity: 1;}
        }

        @media (max-width: 700px) {
            .flower-emoji { font-size: 44px; }
            .flower { width: 55px; }
            .romantic-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="ocean-world" id="oceanWorld">
    <canvas id="seaCanvas"></canvas>
    <div class="flowers-layer" id="flowersLayer"></div>
    <div class="message-panel" id="messagePanel">
        <div class="romantic-text" id="msgText">🌸 Haz clic en cada flor púrpura para revelar un mensaje romántico para ti, mi amor Ryoko 🌸</div>
        <div id="poemDisplay" style="display: none;" class="poem-area"></div>
    </div>
    <div class="flower-counter" id="flowerCounter">🌺 0 / 6 🌸</div>
</div>

<script>
    (function() {
        // ======================== Mundo oceánico de Ryoko ===================
        // 6 flores púrpuras de diferentes tipos
        const flowerTypes = [
            "🌷",  // tulipán morado
            "🌸",  // cerezo morado
            "🌺",  // hibisco púrpura
            "🌼",  // margarita violeta
            "🪷",  // loto púrpura
            "💜"   // corazón floral
        ];
        // Mensajes súper largos y románticos para cada flor (4-5 líneas)
        const flowerMessages = [
            "✨ Mi querida Ryoko, cada vez que veo el océano pienso en la profundidad de tu alma. Como las mareas, tu amor me atrae más cerca y jamás quiero escapar. Tu sonrisa es el amanecer sobre las olas tranquilas. Te amo infinitamente. 💖",
            "🌊 Tus ojos guardan el misterio del mar profundo, Ryoko. Cada mirada tuya hace nadar mi corazón de felicidad. Eres el tesoro que soñaban los marineros, y yo te encontré. Te amo mucho, mi princesa del mar. 🌹",
            "🐚 Cuando ríes, Ryoko, parecen delfines jugando en la superficie, pura alegría y luz. Tu voz es la melodía de las olas que calma mi alma. Me enamoro más de ti con cada latido. Te adoro mi alma. 💘",
            "💜 Tu amor es como el coral púrpura más raro, vibrante y precioso. Cada momento contigo es un viaje romántico. Los peces y tiburones llevan tu inicial 'R' porque todo mi océano te pertenece. Eres mi todo. 🫀",
            "🌹 Ryoko, eres mi ancla y mi vela. Sin ti estoy perdido en la tormenta. Pero contigo cada ola nos lleva al paraíso. Tus manos suaves y tu corazón cálido son mi hogar. Te amo, mi vida. 💕",
            "🍃 Como un loto púrpura que florece en el mar infinito, tu belleza lo trasciende todo. Haces mi mundo colorido, mis días más brillantes, mis noches más dulces. Quiero abrazarte siempre. A+R = AMOR INFINITO. 🌟"
        ];

        // Poema romántico súper largo (sobre su belleza, labios, mejillas, boca, cabello, mar, felicidad)
        const romanticPoem = `✨✨✨ * MI ETERNA ODA A RYOKO * ✨✨✨

El océano susurra historias de tu gracia,
Cada ola es seda que enmarca tu tierna cara.
Tu cabello, cascada de marea medianoche,
Donde cada hebra con destellos de amor se toce.

Tus mejillas, como rubor del alba en mares serenos,
Tus labios, dos pétalos que me ponen de rodillas llenos.
Los arrecifes de coral envidian tu boca,
Pues cada palabra tuya mi corazón invoca,
Un compás hacia tu dulce voz,
En todos los siete mares, tú eres mi sol.

Ryoko, tu belleza refleja la espuma de la luna,
Y cuando sonríes, sé que tengo una fortuna.
Tus ojos contienen galaxias más allá del abismo,
Un tesoro que mi alma guarda en sí mismo.
Cada vez que respiras, mi barco de alegría zarpa,
Sin importar la tormenta, contigo mi alma se agarra.

Los peces nadan alrededor de tu nombre, los tiburones se inclinan,
Porque un amor como el nuestro nunca se arruina.
Me haces feliz más que estrellas en el cielo,
Mis sentimientos hacia ti son un eterno vuelo.
Tu corazón es como el océano, profundo y azul,
Rebosante de vida, mágico y cual chapuzón de tul.

💜 TE AMO RYOKO, más de lo que palabras pueden expresar,
🌊 TE ADORO MI ALMA, cada noche y al despertar.
Cada caracol en la playa repite nuestro juramento:
"A + R = PARA SIEMPRE" — esa es mi verdad, mi aliento.

Para siempre tuyo, profunda e infinitamente. 🐠💖`;

        const flowersData = [];
        let flowersClicked = 0;
        let poemRevealed = false;
        const flowerCounterSpan = document.getElementById("flowerCounter");
        const msgTextDiv = document.getElementById("msgText");
        const poemDisplayDiv = document.getElementById("poemDisplay");
        const oceanContainer = document.getElementById("oceanWorld");

        // ----- Canvas: fondo + peces y tiburones con letra R y corazón pequeño
        const canvas = document.getElementById("seaCanvas");
        const ctx = canvas.getContext("2d");
        let width, height;
        
        function resizeCanvas() {
            const rect = oceanContainer.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width;
            canvas.height = height;
            drawOceanLife();
        }

        let marineCreatures = [];

        function initMarineLife() {
            marineCreatures = [];
            const fishCount = 14;
            const sharkCount = 4;
            // peces
            for (let i = 0; i < fishCount; i++) {
                marineCreatures.push({
                    type: 'fish',
                    x: Math.random() * 100,
                    y: 20 + Math.random() * 70,
                    size: 32 + Math.random() * 12,
                    speedX: 0.4 + Math.random() * 0.6,
                    direction: Math.random() > 0.5 ? 1 : -1,
                    floatOffset: Math.random() * Math.PI * 2,
                });
            }
            // tiburones
            for (let i = 0; i < sharkCount; i++) {
                marineCreatures.push({
                    type: 'shark',
                    x: Math.random() * 100,
                    y: 50 + Math.random() * 40,
                    size: 62 + Math.random() * 14,
                    speedX: 0.2 + Math.random() * 0.5,
                    direction: Math.random() > 0.5 ? 1 : -1,
                    floatOffset: Math.random() * Math.PI * 2,
                });
            }
        }

        let animationFrame;
        function drawOceanLife() {
            if (!ctx || width === 0) return;
            ctx.clearRect(0, 0, width, height);
            
            ctx.save();
            // gradiente de fondo marino
            const grad = ctx.createLinearGradient(0, 0, width*0.8, height);
            grad.addColorStop(0, '#035c7c');
            grad.addColorStop(1, '#013a5c');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            // burbujas decorativas
            ctx.fillStyle = "rgba(210, 245, 255, 0.45)";
            for(let i=0;i<40;i++) {
                ctx.beginPath();
                ctx.arc((i*131)%width, (Date.now()*0.002 + i*57) % height, 2+(i%5), 0, Math.PI*2);
                ctx.fill();
            }
            
            // actualizar posición y dibujar peces/tiburones con "R ❤️"
            for(let creature of marineCreatures) {
                let moveX = creature.speedX * creature.direction;
                creature.x += moveX;
                if (creature.x > 105) creature.x = -5;
                if (creature.x < -5) creature.x = 105;
                
                let floatY = Math.sin(Date.now() * 0.002 + creature.floatOffset) * 4;
                let drawX = (creature.x / 100) * width;
                let drawY = (creature.y / 100) * height + floatY;
                let fontSize = creature.size;
                ctx.font = `${fontSize}px "Segoe UI Emoji", "Apple Color Emoji", system-ui, sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                let emoji = creature.type === 'fish' ? "🐟" : "🦈";
                ctx.shadowBlur = 8;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.fillStyle = "#ffffffcc";
                ctx.fillText(emoji, drawX+2, drawY+2);
                ctx.fillStyle = "#fff";
                ctx.fillText(emoji, drawX, drawY);
                // Letra R con pequeño corazón
                ctx.font = `bold ${fontSize * 0.48}px "Segoe UI", system-ui`;
                ctx.fillStyle = "#FFE3B0";
                ctx.shadowBlur = 3;
                ctx.fillText("R ❤️", drawX + fontSize*0.2, drawY - fontSize*0.2);
            }
            
            // pequeños corazones flotantes adicionales
            ctx.font = "22px emoji";
            for (let i=0;i<12;i++) {
                let x = (Date.now()*0.7 + i*97) % width;
                let y = (Date.now()*0.4 + i*123) % height;
                ctx.fillStyle = "#ff99ccaa";
                ctx.fillText("💕", x, y);
            }
            ctx.restore();
            animationFrame = requestAnimationFrame(drawOceanLife);
        }

        // Crear flores en posiciones aleatorias pero bien distribuidas
        function createFlowers() {
            const layer = document.getElementById("flowersLayer");
            layer.innerHTML = "";
            const usedPositions = [];
            for (let i = 0; i < 6; i++) {
                let leftPos, topPos;
                let overlapping = true;
                let tries = 0;
                while (overlapping && tries < 50) {
                    leftPos = 5 + Math.random() * 80; // porcentaje
                    topPos = 10 + Math.random() * 75;
                    overlapping = false;
                    for (let p of usedPositions) {
                        if (Math.abs(p.left - leftPos) < 18 && Math.abs(p.top - topPos) < 18) {
                            overlapping = true;
                            break;
                        }
                    }
                    tries++;
                }
                usedPositions.push({ left: leftPos, top: topPos });
                const flowerDiv = document.createElement("div");
                flowerDiv.className = "flower";
                flowerDiv.style.left = `${leftPos}%`;
                flowerDiv.style.top = `${topPos}%`;
                const emojiType = flowerTypes[i % flowerTypes.length];
                flowerDiv.innerHTML = `<div class="flower-emoji" style="color: #c281ff; text-shadow: 0 0 5px violet;">${emojiType}</div>`;
                flowerDiv.setAttribute("data-index", i);
                flowerDiv.addEventListener("click", (e) => {
                    e.stopPropagation();
                    handleFlowerClick(i, flowerDiv);
                });
                layer.appendChild(flowerDiv);
                flowersData.push({ element: flowerDiv, clicked: false, msg: flowerMessages[i] });
            }
        }

        function handleFlowerClick(index, flowerElement) {
            if (flowersData[index].clicked) {
                msgTextDiv.innerHTML = `💜 Mi amor, ya viste el mensaje de esta flor. ¡Haz clic en las otras flores moradas, Ryoko! 💜`;
                setTimeout(() => {
                    if(!poemRevealed) msgTextDiv.innerHTML = `🌸 Haz clic en cada flor púrpura para revelar un mensaje romántico para ti, mi amor Ryoko 🌸`;
                }, 1800);
                return;
            }
            // marcar como clickeada
            flowersData[index].clicked = true;
            flowersClicked++;
            flowerCounterSpan.innerHTML = `🌺 ${flowersClicked} / 6 🌸`;
            // mostrar mensaje súper romántico
            const romanticMsg = flowersData[index].msg;
            msgTextDiv.innerHTML = `💗✨ ${romanticMsg} ✨💗`;
            // pequeña animación
            flowerElement.style.transform = "scale(0.95)";
            setTimeout(() => { flowerElement.style.transform = ""; }, 200);
            flowerElement.style.opacity = "0.7";
            flowerElement.style.filter = "grayscale(0.2)";
            flowerElement.style.pointerEvents = "none";
            
            // verificar si completó las 6 flores
            if (flowersClicked === 6 && !poemRevealed) {
                revealPoem();
            } else if (flowersClicked !== 6 && !poemRevealed) {
                setTimeout(() => {
                    if (flowersClicked !== 6 && !poemRevealed) {
                        msgTextDiv.innerHTML = `🌸 Sigue haciendo clic en las flores púrpuras, mi amor. ¡Quedan ${6-flowersClicked} flor(es) para nuestro poema eterno! 🌸`;
                    }
                }, 4000);
            }
        }

        function revealPoem() {
            if (poemRevealed) return;
            poemRevealed = true;
            msgTextDiv.style.display = "none";
            poemDisplayDiv.style.display = "block";
            poemDisplayDiv.innerHTML = `<div style="font-family: 'Segoe UI', 'Quicksand', cursive; text-align: center; line-height: 1.6;">${romanticPoem.replace(/\n/g, '<br>')}</div><br><div style="text-align:center; font-size:1.8rem;">🐠 A + R = PARA SIEMPRE 🐚<br>🌊💖🌊</div>`;
            const counterSpan = document.getElementById("flowerCounter");
            counterSpan.style.background = "#ff80aacc";
            counterSpan.innerHTML = "💖 COMPLETO 💖";
            // generar corazones flotantes de celebración
            for(let i=0;i<30;i++) {
                createFloatingHeart();
            }
        }

        function createFloatingHeart() {
            const heartDiv = document.createElement("div");
            heartDiv.innerText = "💜";
            heartDiv.style.position = "absolute";
            heartDiv.style.fontSize = 24 + Math.random() * 28 + "px";
            heartDiv.style.left = Math.random() * 100 + "%";
            heartDiv.style.bottom = "0px";
            heartDiv.style.pointerEvents = "none";
            heartDiv.style.zIndex = "50";
            heartDiv.style.opacity = "0.9";
            heartDiv.style.transition = "all 3s ease-out";
            oceanContainer.appendChild(heartDiv);
            requestAnimationFrame(() => {
                heartDiv.style.transform = `translateY(-${window.innerHeight * 0.7}px) rotate(10deg)`;
                heartDiv.style.opacity = "0";
            });
            setTimeout(() => heartDiv.remove(), 3000);
        }

        // Efecto al hacer clic en el océano: aparece "R 💖"
        function addOceanRipple(e) {
            const rect = oceanContainer.getBoundingClientRect();
            const ripple = document.createElement("div");
            ripple.innerText = "💗 R 💗";
            ripple.style.position = "absolute";
            ripple.style.left = (e.clientX - rect.left) + "px";
            ripple.style.top = (e.clientY - rect.top) + "px";
            ripple.style.fontSize = "32px";
            ripple.style.pointerEvents = "none";
            ripple.style.zIndex = "45";
            ripple.style.transform = "translate(-50%, -50%)";
            ripple.style.opacity = "1";
            ripple.style.transition = "all 1s ease-out";
            oceanContainer.appendChild(ripple);
            setTimeout(() => {
                ripple.style.opacity = "0";
                ripple.style.transform = "translate(-50%, -50%) scale(1.5)";
                setTimeout(() => ripple.remove(), 1000);
            }, 50);
        }

        // Inicializar todo al cargar
        window.addEventListener("load", () => {
            resizeCanvas();
            initMarineLife();
            drawOceanLife();
            createFlowers();
            window.addEventListener("resize", () => {
                resizeCanvas();
                drawOceanLife();
            });
            oceanContainer.addEventListener("click", (e) => {
                // evitar si el clic fue sobre alguna flor o panel, pero se permite igual
                if(e.target === oceanContainer || e.target === canvas) {
                    addOceanRipple(e);
                }
            });
        });
    })();
</script>
</body>
</html>
