<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>El Océano de Ryoko 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #001f3f 0%, #002b4f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: oblique;
            overflow-x: hidden;
            padding: 12px;
        }

        .ocean-world {
            position: relative;
            width: 1300px;
            max-width: 100%;
            height: 90vh;
            min-height: 550px;
            background: radial-gradient(circle at 20% 30%, #0a4c6e, #022b44);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.2);
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(255,215,150,0.6);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 2;
            pointer-events: none;
        }

        .flowers-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .flower {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3));
            transition: transform 0.2s ease, filter 0.2s;
            width: clamp(50px, 12vw, 70px);
            text-align: center;
            z-index: 20;
        }

        .flower:active {
            transform: scale(0.95);
        }

        .flower-emoji {
            font-size: clamp(40px, 10vw, 58px);
            display: block;
            transition: all 0.2s;
        }

        .message-panel {
    position: absolute;
    bottom: 16px;
    left: 16px;
    right: 16px;
    background: rgba(10, 25, 45, 0.85);
    backdrop-filter: blur(16px);
    border-radius: 32px;
    padding: 16px 20px;
    color: #fff3e0;
    font-size: clamp(0.9rem, 4vw, 1.2rem);
    font-weight: 600;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-style: normal;
    border: 1px solid rgba(255, 200, 180, 0.8);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 180, 220, 0.4);
    z-index: 30;
    transition: all 0.3s ease;
    max-height: 35vh;
    overflow-y: auto;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-shadow: 0 0 6px rgba(255, 200, 230, 0.5);
}

        .romantic-text {
            font-size: clamp(0.85rem, 3.8vw, 1.15rem);
            letter-spacing: 0.3px;
            word-break: break-word;
        }

       .poem-area {
    background: rgba(0, 0, 0, 0.7);
    border-radius: 32px;
    padding: 14px 20px;
    margin-top: 6px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-style: normal;
    font-weight: 500;
    white-space: pre-line;
    font-size: clamp(0.85rem, 3.5vw, 1.05rem);
    max-height: 40vh;
    overflow-y: auto;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-shadow: 0 0 4px rgba(255, 200, 200, 0.3);
    border: 1px solid rgba(255, 200, 180, 0.4);
}

        .flower-counter {
            position: absolute;
            top: 12px;
            right: 16px;
            background: #ffb7c5dd;
            backdrop-filter: blur(6px);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            color: #2a0a2a;
            font-family: monospace;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            z-index: 35;
            border: 1px solid #ffddbb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        @media (max-width: 700px) {
            .flower { width: 50px; }
            .flower-emoji { font-size: 44px; }
            .message-panel { padding: 12px 16px; bottom: 12px; left: 12px; right: 12px; }
            .flower-counter { top: 10px; right: 12px; padding: 4px 12px; }
        }

        @keyframes waveMove {
            0% { background-position-x: 0px; }
            100% { background-position-x: 200px; }
        }
        
        /* Texto flotante sutil en el fondo */
        .subtle-bg-text {
            position: absolute;
            bottom: 15%;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(18px, 6vw, 38px);
            font-weight: bold;
            font-family: 'Segoe UI', 'Quicksand', cursive;
            color: rgba(255, 220, 180, 0.18);
            text-shadow: 0 0 8px rgba(255,200,150,0.2);
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 1;
            white-space: nowrap;
            animation: subtleFloat 12s ease-in-out infinite;
            backdrop-filter: blur(1px);
            width: 100%;
            transform: rotate(-3deg);
        }
        
        @keyframes subtleFloat {
            0% { transform: rotate(-3deg) translateY(0px); opacity: 0.12; }
            50% { transform: rotate(-2deg) translateY(-8px); opacity: 0.22; }
            100% { transform: rotate(-3deg) translateY(0px); opacity: 0.12; }
        }
        
        /* Texto adicional "A+R = FOREVER" más sutil */
        .subtle-bg-text-bottom {
            position: absolute;
            bottom: 5%;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(14px, 4.5vw, 28px);
            font-weight: bold;
            font-family: monospace;
            color: rgba(210, 180, 250, 0.15);
            text-shadow: 0 0 6px rgba(200,150,255,0.15);
            pointer-events: none;
            z-index: 1;
            letter-spacing: 3px;
            animation: softPulse 8s ease-in-out infinite;
        }
        
        @keyframes softPulse {
            0% { opacity: 0.1; letter-spacing: 2px; }
            50% { opacity: 0.2; letter-spacing: 5px; }
            100% { opacity: 0.1; letter-spacing: 2px; }
        }
    </style>
</head>
<body>
<div class="ocean-world" id="oceanWorld">
    <canvas id="seaCanvas"></canvas>
    <div class="flowers-layer" id="flowersLayer"></div>
    <!-- Texto romántico sutil en el fondo del mar -->
    <div class="subtle-bg-text">🌊 Ryoko, soy tuyo para siempre, mi alma 🌊</div>
    <div class="subtle-bg-text-bottom">💜 A + R = FOREVER 💜</div>
    <div class="message-panel" id="messagePanel">
        <div class="romantic-text" id="msgText">🌸 Haz clic en cada flor púrpura para revelar un mensaje romántico para ti, mi amor Ryoko 🌸</div>
        <div id="poemDisplay" style="display: none;" class="poem-area"></div>
    </div>
    <div class="flower-counter" id="flowerCounter">🌺 0 / 6 🌸</div>
</div>

<script>
    (function() {
        // ======================== Mundo oceánico optimizado ===================
        const flowerTypes = ["🌷", "🌸", "🌺", "🌼", "🪷", "💜"];
        
        const flowerMessages = [
            "✨ Mi querida Ryoko, cada vez que veo el océano pienso en la profundidad de tu alma. Como las mareas, tu amor me atrae más cerca y jamás quiero escapar. Tu sonrisa es el amanecer sobre las olas tranquilas. Te amo infinitamente. 💖",
            "🌊 Tus ojos guardan el misterio del mar profundo, Ryoko. Cada mirada tuya hace nadar mi corazón de felicidad. Eres el tesoro que soñaban los marineros, y yo te encontré. Te amo mucho, mi princesa del mar. 🌹",
            "🐚 Cuando ríes, Ryoko, parecen delfines jugando en la superficie, pura alegría y luz. Tu voz es la melodía de las olas que calma mi alma. Me enamoro más de ti con cada latido. Te adoro mi alma. 💘",
            "💜 Tu amor es como el coral púrpura más raro, vibrante y precioso. Cada momento contigo es un viaje romántico. Los peces y tiburones llevan tu inicial 'R' porque todo mi océano te pertenece. Eres mi todo. 🫀",
            "🌹 Ryoko, eres mi ancla y mi vela. Sin ti estoy perdido en la tormenta. Pero contigo cada ola nos lleva al paraíso. Tus manos suaves y tu corazón cálido son mi hogar. Te amo, mi vida. 💕",
            "🍃 Como un loto púrpura que florece en el mar infinito, tu belleza lo trasciende todo. Haces mi mundo colorido, mis días más brillantes, mis noches más dulces. Quiero abrazarte siempre. A+R = AMOR INFINITO. 🌟"
        ];

        const romanticPoem = `✨✨✨ * MI ETERNA ODA A RYOKO * ✨✨✨

El océano susurra historias de tu gracia,
Cada ola es seda que enmarca tu tierna cara.
Tu cabello, cascada de marea medianoche,
Donde cada hebra con destellos de amor se toce.

Tus mejillas, como rubor del alba en mares serenos,
Tus labios, dos pétalos que me ponen de rodillas llenos.
Los arrecifes de coral envidian tu boca,
Pues cada palabra tuya mi corazón invoca,
Un compás hacia tu dulce voz,
En todos los siete mares, tú eres mi sol.

Ryoko, tu belleza refleja la espuma de la luna,
Y cuando sonríes, sé que tengo una fortuna.
Tus ojos contienen galaxias más allá del abismo,
Un tesoro que mi alma guarda en sí mismo.
Cada vez que respiras, mi barco de alegría zarpa,
Sin importar la tormenta, contigo mi alma se agarra.

Los peces nadan alrededor de tu nombre, los tiburones se inclinan,
Porque un amor como el nuestro nunca se arruina.
Me haces feliz más que estrellas en el cielo,
Mis sentimientos hacia ti son un eterno vuelo.
Tu corazón es como el océano, profundo y azul,
Rebosante de vida, mágico y cual chapuzón de tul.

💜 TE AMO RYOKO, más de lo que palabras pueden expresar,
🌊 TE ADORO MI ALMA, cada noche y al despertar.
Cada caracol en la playa repite nuestro juramento:
"A + R = PARA SIEMPRE" — esa es mi verdad, mi aliento.

Para siempre tuyo, profunda e infinitamente. 🐠💖`;

        const flowersData = [];
        let flowersClicked = 0;
        let poemRevealed = false;
        const flowerCounterSpan = document.getElementById("flowerCounter");
        const msgTextDiv = document.getElementById("msgText");
        const poemDisplayDiv = document.getElementById("poemDisplay");
        const oceanContainer = document.getElementById("oceanWorld");

        // Canvas optimizado con olas y menos lag
        const canvas = document.getElementById("seaCanvas");
        const ctx = canvas.getContext("2d");
        let width, height;
        let animationFrame;
        let waveOffset = 0;
        
        // Reducir cantidad de criaturas para mejor rendimiento en móvil
        let marineCreatures = [];
        
        function resizeCanvas() {
            const rect = oceanContainer.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width;
            canvas.height = height;
        }

        function initMarineLife() {
            marineCreatures = [];
            // Menos peces para mejor rendimiento (8 en lugar de 14)
            const fishCount = Math.min(8, Math.floor(width / 120));
            const sharkCount = Math.min(3, Math.floor(width / 250));
            
            for (let i = 0; i < fishCount; i++) {
                marineCreatures.push({
                    type: 'fish',
                    x: Math.random() * 100,
                    y: 15 + Math.random() * 70,
                    size: 28 + Math.random() * 14,
                    speedX: 0.25 + Math.random() * 0.4,
                    direction: Math.random() > 0.5 ? 1 : -1,
                    floatOffset: Math.random() * Math.PI * 2,
                });
            }
            for (let i = 0; i < sharkCount; i++) {
                marineCreatures.push({
                    type: 'shark',
                    x: Math.random() * 100,
                    y: 40 + Math.random() * 45,
                    size: 52 + Math.random() * 16,
                    speedX: 0.15 + Math.random() * 0.35,
                    direction: Math.random() > 0.5 ? 1 : -1,
                    floatOffset: Math.random() * Math.PI * 2,
                });
            }
        }

        // Dibujar olas animadas
        function drawWaves() {
            waveOffset = (waveOffset + 0.8) % (Math.PI * 2);
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                const yOffset = height - 40 + i * 18;
                ctx.moveTo(0, yOffset + Math.sin(waveOffset + i) * 6);
                for (let x = 0; x <= width; x += 30) {
                    const y = yOffset + Math.sin((x * 0.02) + waveOffset + i * 1.5) * 8;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.fillStyle = `rgba(90, 180, 220, ${0.12 - i * 0.03})`;
                ctx.fill();
            }
        }

        function drawOceanLife() {
            if (!ctx || width === 0 || height === 0) {
                requestAnimationFrame(drawOceanLife);
                return;
            }
            
            ctx.clearRect(0, 0, width, height);
            ctx.save();
            
            // Gradiente marino profundo
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#02648c');
            grad.addColorStop(1, '#013a5c');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            // Rayos de luz (efecto de sol bajo el agua)
            ctx.globalAlpha = 0.12;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(width * 0.2 + i * 40, 0);
                ctx.lineTo(width * 0.5 + i * 30, height);
                ctx.lineTo(width * 0.3 + i * 35, height);
                ctx.fillStyle = '#ffec8a';
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // Burbujas más suaves
            ctx.fillStyle = "rgba(180, 230, 255, 0.45)";
            const time = Date.now() * 0.002;
            for(let i = 0; i < 24; i++) {
                ctx.beginPath();
                let bubbleX = (i * 83 + time * 30) % width;
                let bubbleY = (time * 25 + i * 47) % height;
                ctx.arc(bubbleX, bubbleY, 2 + (i % 4), 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Dibujar peces y tiburones con movimiento fluido
            for(let creature of marineCreatures) {
                let moveX = creature.speedX * creature.direction;
                creature.x += moveX;
                if (creature.x > 105) creature.x = -5;
                if (creature.x < -5) creature.x = 105;
                
                let floatY = Math.sin(Date.now() * 0.0025 + creature.floatOffset) * 3.5;
                let drawX = (creature.x / 100) * width;
                let drawY = (creature.y / 100) * height + floatY;
                let fontSize = creature.size;
                
                ctx.font = `${fontSize}px "Segoe UI Emoji", "Apple Color Emoji", system-ui, sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                let emoji = creature.type === 'fish' ? "🐟" : "🦈";
                ctx.shadowBlur = 6;
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.fillStyle = "#ffffffdd";
                ctx.fillText(emoji, drawX+1.5, drawY+1.5);
                ctx.fillStyle = "#fff9f0";
                ctx.fillText(emoji, drawX, drawY);
                
                // Letra R con corazón pequeñito
                ctx.font = `bold ${Math.max(14, fontSize * 0.44)}px "Segoe UI", system-ui`;
                ctx.fillStyle = "#FFDDB0";
                ctx.shadowBlur = 2;
                ctx.fillText("R ❤️", drawX + fontSize*0.18, drawY - fontSize*0.2);
            }
            
            // Pequeños destellos de amor flotantes (reducidos)
            ctx.font = "20px emoji";
            for (let i = 0; i < 8; i++) {
                let x = (Date.now() * 0.5 + i * 113) % width;
                let y = (Date.now() * 0.3 + i * 97) % height;
                ctx.fillStyle = "#ffaaccaa";
                ctx.fillText("💕", x, y);
            }
            
            // Dibujar olas al final para efecto de profundidad
            drawWaves();
            
            ctx.restore();
            animationFrame = requestAnimationFrame(drawOceanLife);
        }

        function createFlowers() {
            const layer = document.getElementById("flowersLayer");
            layer.innerHTML = "";
            const usedPositions = [];
            for (let i = 0; i < 6; i++) {
                let leftPos, topPos;
                let overlapping = true;
                let tries = 0;
                while (overlapping && tries < 40) {
                    leftPos = 8 + Math.random() * 78;
                    topPos = 12 + Math.random() * 72;
                    overlapping = false;
                    for (let p of usedPositions) {
                        if (Math.abs(p.left - leftPos) < 16 && Math.abs(p.top - topPos) < 16) {
                            overlapping = true;
                            break;
                        }
                    }
                    tries++;
                }
                usedPositions.push({ left: leftPos, top: topPos });
                const flowerDiv = document.createElement("div");
                flowerDiv.className = "flower";
                flowerDiv.style.left = `${leftPos}%`;
                flowerDiv.style.top = `${topPos}%`;
                const emojiType = flowerTypes[i % flowerTypes.length];
                flowerDiv.innerHTML = `<div class="flower-emoji" style="color: #d48eff; text-shadow: 0 0 4px violet;">${emojiType}</div>`;
                flowerDiv.setAttribute("data-index", i);
                flowerDiv.addEventListener("click", (e) => {
                    e.stopPropagation();
                    handleFlowerClick(i, flowerDiv);
                });
                layer.appendChild(flowerDiv);
                flowersData.push({ element: flowerDiv, clicked: false, msg: flowerMessages[i] });
            }
        }

        // SIN TIMERS QUE BORRAN EL MENSAJE - el mensaje se queda hasta nuevo clic o poema
        function handleFlowerClick(index, flowerElement) {
            // Si ya fue clickeada, mostramos mensaje de ayuda sin timers
            if (flowersData[index].clicked) {
                msgTextDiv.innerHTML = `💜 Mi amor, ya viste esta flor. ¡Toca otra flor morada, Ryoko! 💜`;
                return;
            }
            
            // Marcar como clickeada
            flowersData[index].clicked = true;
            flowersClicked++;
            flowerCounterSpan.innerHTML = `🌺 ${flowersClicked} / 6 🌸`;
            
            // Mostrar mensaje romántico de esta flor (permanece visible)
            const romanticMsg = flowersData[index].msg;
            msgTextDiv.innerHTML = `💗✨ ${romanticMsg} ✨💗`;
            
            // Animación y deshabilitar esta flor permanentemente
            flowerElement.style.transform = "scale(0.95)";
            setTimeout(() => { flowerElement.style.transform = ""; }, 150);
            flowerElement.style.opacity = "0.6";
            flowerElement.style.filter = "grayscale(0.2)";
            flowerElement.style.pointerEvents = "none";
            
            // Verificar si completó las 6 flores
            if (flowersClicked === 6 && !poemRevealed) {
                revealPoem();
            }
        }

        function revealPoem() {
            if (poemRevealed) return;
            poemRevealed = true;
            msgTextDiv.style.display = "none";
            poemDisplayDiv.style.display = "block";
           poemDisplayDiv.innerHTML = `<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-style: normal; font-weight: 500; text-align: center; line-height: 1.6;">${romanticPoem.replace(/\n/g, '<br>')}</div><br><div style="text-align:center; font-size:1.6rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-style: normal;">🐠 A + R = PARA SIEMPRE 🐚<br>🌊💖🌊</div>`;
            counterSpan.style.background = "#ff80aacc";
            counterSpan.innerHTML = "💖 COMPLETO 💖";
            
            // Corazones flotantes de celebración
            for(let i=0;i<20;i++) {
                setTimeout(() => createFloatingHeart(), i * 60);
            }
        }

        function createFloatingHeart() {
            const heartDiv = document.createElement("div");
            heartDiv.innerText = "💜";
            heartDiv.style.position = "absolute";
            heartDiv.style.fontSize = 20 + Math.random() * 24 + "px";
            heartDiv.style.left = Math.random() * 100 + "%";
            heartDiv.style.bottom = "0px";
            heartDiv.style.pointerEvents = "none";
            heartDiv.style.zIndex = "50";
            heartDiv.style.opacity = "0.9";
            heartDiv.style.transition = "all 2.8s ease-out";
            oceanContainer.appendChild(heartDiv);
            requestAnimationFrame(() => {
                heartDiv.style.transform = `translateY(-${window.innerHeight * 0.65}px) rotate(12deg)`;
                heartDiv.style.opacity = "0";
            });
            setTimeout(() => heartDiv.remove(), 2800);
        }

        function addOceanRipple(e) {
            const rect = oceanContainer.getBoundingClientRect();
            const ripple = document.createElement("div");
            ripple.innerText = "💗 R 💗";
            ripple.style.position = "absolute";
            ripple.style.left = (e.clientX - rect.left) + "px";
            ripple.style.top = (e.clientY - rect.top) + "px";
            ripple.style.fontSize = "28px";
            ripple.style.pointerEvents = "none";
            ripple.style.zIndex = "45";
            ripple.style.transform = "translate(-50%, -50%)";
            ripple.style.opacity = "1";
            ripple.style.whiteSpace = "nowrap";
            ripple.style.transition = "all 0.8s ease-out";
            oceanContainer.appendChild(ripple);
            setTimeout(() => {
                ripple.style.opacity = "0";
                ripple.style.transform = "translate(-50%, -50%) scale(1.6)";
                setTimeout(() => ripple.remove(), 800);
            }, 30);
        }

        // Inicialización
        let resizeTimeout;
        window.addEventListener("load", () => {
            resizeCanvas();
            initMarineLife();
            createFlowers();
            drawOceanLife();
            
            window.addEventListener("resize", () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    resizeCanvas();
                }, 150);
            });
            
            oceanContainer.addEventListener("click", (e) => {
                if(e.target === oceanContainer || e.target === canvas) {
                    addOceanRipple(e);
                }
            });
            
            oceanContainer.addEventListener("touchstart", (e) => {
                if(e.target === oceanContainer || e.target === canvas) {
                    const touch = e.touches[0];
                    const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                    addOceanRipple(fakeEvent);
                }
            });
        });
    })();
</script>
</body>
</html>
